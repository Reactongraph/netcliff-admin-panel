name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - master
      - development

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy
    environment: ${{ github.ref == 'refs/heads/master' && 'production' || 'development' }}
    env:
      CI: false
      REACT_APP_AWS_HOSTNAME: ${{ secrets.REACT_APP_AWS_HOSTNAME }}
      REACT_APP_BASE_URL: ${{ secrets.REACT_APP_BASE_URL }}
      REACT_APP_BUCKET_NAME: ${{ secrets.REACT_APP_BUCKET_NAME }}
      REACT_APP_PROJECT_NAME: ${{ secrets.REACT_APP_PROJECT_NAME }}
      REACT_APP_SECRET_KEY: ${{ secrets.REACT_APP_SECRET_KEY }}
      
    steps:
      - name: Log Environment
        run: |
          echo "Branch: ${{ github.ref }}"
          echo "Environment: ${{ github.ref == 'refs/heads/master' && 'production' || 'development' }}"
          echo "REACT_APP_BASE_URL: ${{ secrets.REACT_APP_BASE_URL }}"
          echo "REACT_APP_AWS_HOSTNAME: ${{ secrets.REACT_APP_AWS_HOSTNAME }}"
          echo "REACT_APP_BUCKET_NAME: ${{ secrets.REACT_APP_BUCKET_NAME }}"
          echo "REACT_APP_PROJECT_NAME: ${{ secrets.REACT_APP_PROJECT_NAME }}"
          echo "REACT_APP_SECRET_KEY: ${REACT_APP_SECRET_KEY:0:10}..."
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_YELLOW_WAVE_08EC51D00 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"
          api_location: ""
          output_location: "build"
          production_branch: "master"


